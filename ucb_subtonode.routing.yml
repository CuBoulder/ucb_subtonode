ucb_subtonode.create_node:
  path: '/admin/structure/webform/manage/{webform}/submission/{webform_submission}/edit/subtonode'
  defaults:
    _controller: '\Drupal\ucb_subtonode\Controller\SubToNodeController::subtonode'
    _title: 'Create Node'
  requirements:
    _permission: 'administer webform submission'
  options:
    parameters:
      webform_submission:
        type: 'entity:webform_submission'

ucb_subtonode.create_node_view:
  path: '/admin/structure/webform/manage/{webform}/submission/{webform_submission}/subtonode'
  defaults:
    _controller: '\Drupal\ucb_subtonode\Controller\SubToNodeController::subtonode'
    _title: 'Create Node'
  requirements:
    _permission: 'administer webform submission'
  options:
    parameters:
      webform_submission:
        type: 'entity:webform_submission'
